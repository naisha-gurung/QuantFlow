version: '3.8'

services:
  quantflow:
    build: .
    image: quantflow:latest
    container_name: quantflow-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/quantflow
      - SPRING_DATASOURCE_USERNAME=quantflow
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-quantflow_secure}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - quantflow-net

  postgres:
    image: postgres:15-alpine
    container_name: quantflow-db
    environment:
      - POSTGRES_DB=quantflow
      - POSTGRES_USER=quantflow
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quantflow_secure}
    volumes:
      - quantflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantflow-net

  nginx:
    image: nginx:alpine
    container_name: quantflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - quantflow
    networks:
      - quantflow-net

volumes:
  quantflow-db-data:

networks:
  quantflow-net:
    driver: bridge
