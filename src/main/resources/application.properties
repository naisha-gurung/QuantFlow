spring.application.name=QuantFlow

# H2 In-Memory Database (switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:quantflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080
server.servlet.context-path=/

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=QuantFlow API
springdoc.info.description=Algorithmic Trading & Risk Analytics Platform
springdoc.info.version=1.0.0

# Logging
logging.level.com.quantflow=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n
